<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Zimbra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background"></div>

    <div class="login-card">
        <div class="logo">📝</div>
        <h1>Create Account</h1>
        <p class="subtitle">Set your username and password</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST">
            <input type="text" name="username" placeholder="Choose a username" required autofocus>

            <div class="password-box">
                <input id="password" type="password" name="password" placeholder="Choose a password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit">Sign Up</button>
        </form>

        <div class="links">
            <a href="{{ url_for('home') }}">← Back to login</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
