<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>
<body>
    <header class="dash-header">
        <h1>Awareness Dashboard</h1>
        <a class="logout" href="{{ url_for('logout') }}">Log out</a>
    </header>

    <div class="stats">
        <div class="stat-card">
            <span class="stat-num">{{ total_members }}</span>
            <span class="stat-label">Total Members</span>
        </div>
        <div class="stat-card caught">
            <span class="stat-num">{{ viewed_count }}</span>
            <span class="stat-label">Fell for it</span>
        </div>
        <div class="stat-card safe">
            <span class="stat-num">{{ not_viewed }}</span>
            <span class="stat-label">Not caught</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Date</th>
                <th>Time</th>
                <th>IP</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.date }}</td>
                <td>{{ user.time }}</td>
                <td>{{ user.ip }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="empty">No submissions yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
