<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zimbra — Employee Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background"></div>

    <div class="login-card">
        <div class="logo">✉️</div>
        <h1>ZIMBRA</h1>
        <p class="subtitle">Enterprise Mail — Employee Sign In</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="username" placeholder="Username" required autofocus>

            <div class="password-box">
                <input id="password" type="password" name="password" placeholder="Password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="{{ url_for('register') }}">Create account</a>
            <span>·</span>
            <a href="{{ url_for('forgot') }}">Forgot password?</a>
        </div>

        <div class="footer">Enterprise Security Suite v1.0</div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
